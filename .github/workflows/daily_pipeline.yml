name: Daily Weather Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forecast ingestion
        run: python -m src.pipelines.ingest_forecast

      - name: Run actuals ingestion
        run: python -m src.pipelines.ingest_actuals

      - name: Run evaluation
        run: python -m src.pipelines.run_evaluation
